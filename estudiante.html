<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi QR — Asistencia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #111;
    --surface: #1c1c1c;
    --surface2: #262626;
    --border: #333;
    --text: #f2f2f2;
    --muted: #666;
    --accent: #d4f53c;
    --r: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 420px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    gap: 20px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
  }

  .card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 14px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .results-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 10px;
    max-height: 320px;
    overflow-y: auto;
  }

  .result-item {
    padding: 13px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .result-item:active { border-color: var(--accent); background: #1c2600; }

  /* QR VIEW */
  #qr-view { display: none; flex-direction: column; align-items: center; gap: 18px; }

  .qr-box {
    background: white;
    padding: 18px;
    border-radius: 12px;
  }

  .qr-name {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
  }

  .qr-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .btn-ghost {
    padding: 11px 20px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--surface2);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .btn-download {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 9px;
    background: var(--accent);
    color: #111;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .btn-download:active { transform: scale(0.97); }

  .download-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 14px 0; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <span class="logo">Asistencia</span>
  <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)" id="hdate"></span>
</header>

<!-- BÚSQUEDA -->
<div class="card" id="search-view">
  <div class="card-label">Buscá tu nombre</div>
  <input type="text" id="search-input" placeholder="Escribí tu apellido..." oninput="onSearch()" autocomplete="off" spellcheck="false">
  <div class="results-list" id="results"></div>
</div>

<!-- QR -->
<div id="qr-view">
  <div class="card" style="width:100%">
    <div class="card-label">Tu código QR</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:4px 0">
      <div class="qr-box" id="qr-output"></div>
      <div class="qr-name" id="qr-name"></div>
      <div class="qr-hint">Mostrá este QR al docente en cada clase</div>
      <button class="btn-download" onclick="downloadQR()">Guardar QR en el celular</button>
      <div class="download-hint">Guardalo una sola vez.<br>Lo usás en todas las clases.</div>
      <button class="btn-ghost" onclick="backToSearch()">Cambiar estudiante</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-lMsVl9YHt5Hb4l2sfLs3_dt60RIcdgghAAuWaJse9t2ueKV0055YjQO2GMACY_u8mg/exec'; // reemplazar con tu URL de Apps Script
  let students = [];

  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('es-UY', { weekday:'short', day:'numeric', month:'short' });

  let loading = false;

  async function loadStudents() {
    if (!SCRIPT_URL || SCRIPT_URL.includes('{{')) return;
    loading = true;
    try {
      const res  = await fetch(SCRIPT_URL + '?action=getStudents', { redirect: 'follow' });
      const text = await res.text();
      const data = JSON.parse(text);
      if (Array.isArray(data.students)) {
        students = data.students;
      }
    } catch(e) {
      console.error('loadStudents error:', e);
    }
    loading = false;
  }

  loadStudents();

  async function onSearch() {
    const q   = document.getElementById('search-input').value.trim().toLowerCase();
    const box = document.getElementById('results');
    if (q.length < 2) { box.innerHTML = ''; return; }

    // Si todavía está cargando o no cargó, reintentar
    if (students.length === 0) {
      box.innerHTML = '<div class="empty">Cargando lista...</div>';
      await loadStudents();
    }

    const hits = students.filter(s => s.name.toLowerCase().includes(q)).slice(0, 10);
    if (!hits.length) { box.innerHTML = '<div class="empty">Sin coincidencias</div>'; return; }
    box.innerHTML = hits.map(s =>
      `<div class="result-item" onclick="showQR('${s.id}','${s.name.replace(/'/g,"\\'")}')">
        ${s.name}
      </div>`
    ).join('');
  }

  let currentName = '';

  function showQR(id, name) {
    currentName = name;
    document.getElementById('search-view').style.display = 'none';
    const qv = document.getElementById('qr-view');
    qv.style.display = 'flex';
    document.getElementById('qr-name').textContent = name;
    const box = document.getElementById('qr-output');
    box.innerHTML = '';
    new QRCode(box, {
      text: id,
      width: 230, height: 230,
      colorDark: '#000', colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  function downloadQR() {
    // QRCode.js genera un <canvas> o un <img> según el navegador
    const box    = document.getElementById('qr-output');
    const canvas = box.querySelector('canvas');
    const img    = box.querySelector('img');

    if (canvas) {
      // Crear canvas más grande con nombre incluido
      const pad     = 24;
      const textH   = 40;
      const size    = canvas.width;
      const out     = document.createElement('canvas');
      out.width     = size + pad * 2;
      out.height    = size + pad * 2 + textH;
      const ctx     = out.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.drawImage(canvas, pad, pad);

      ctx.fillStyle = '#111111';
      ctx.font      = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(currentName, out.width / 2, size + pad * 2 + textH / 2 + 4);

      const link    = document.createElement('a');
      link.download = 'qr-asistencia-' + currentName.replace(/\s+/g, '-').toLowerCase() + '.png';
      link.href     = out.toDataURL('image/png');
      link.click();
    } else if (img) {
      // Fallback para Safari: abrir imagen en nueva pestaña para guardar manualmente
      const w = window.open('');
      w.document.write('<img src="' + img.src + '" style="width:100%;max-width:300px"><p style="font-family:sans-serif;text-align:center">Mantené presionada la imagen para guardarla</p>');
    }
  }

  function backToSearch() {
    document.getElementById('qr-view').style.display  = 'none';
    document.getElementById('search-view').style.display = 'block';
    document.getElementById('search-input').value = '';
    document.getElementById('results').innerHTML  = '';
    document.getElementById('qr-output').innerHTML = '';
  }
</script>
</body>
</html>
